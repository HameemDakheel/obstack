# OTel-jps base compose file.
# This file declares networks and volumes; services are layered in by `compose/<profile>.yml`.
# Run with: docker compose -f docker-compose.yml -f compose/simple.yml up -d
# Or via:    make simple

networks:
  obs-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  prometheus_data:
  victorialogs_data:
  tempo_data:
  pyroscope_data:
  grafana_data:

# Service blocks are appended below as Tasks 6–12 land.
services: {}
