apiVersion: 1

contactPoints:
  - orgId: 1
    name: default-webhook
    receivers:
      - uid: default-webhook
        type: webhook
        settings:
          url: ${ALERT_WEBHOOK_URL:-https://example.invalid/alert}
          httpMethod: POST
          maxAlerts: 0
        disableResolveMessage: false

  - orgId: 1
    name: blackhole
    receivers:
      - uid: blackhole
        type: webhook
        settings:
          url: https://example.invalid/blackhole
        disableResolveMessage: true
