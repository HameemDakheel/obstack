# Prometheus config — Simple profile.
# Receives metrics via OTel Collector remote-write (push from collector → us).
# Self-scrapes own /metrics + scrapes other backends for stack health dashboards.

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    profile: simple

rule_files:
  - /etc/prometheus/rules/*.yaml

scrape_configs:
  - job_name: prometheus-self
    static_configs:
      - targets: ['localhost:9090']

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8888']

  - job_name: tempo
    static_configs:
      - targets: ['tempo:3200']

  - job_name: pyroscope
    static_configs:
      - targets: ['pyroscope:4040']

  - job_name: grafana
    static_configs:
      - targets: ['grafana:3000']
    metrics_path: /metrics

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
