# OTel-jps Dokploy-tuned compose.
# Single self-contained file (Dokploy templates use one compose file per template).
# Differences from the base docker-compose.yml + compose/simple.yml:
#   - Resource limits inlined (no overlay file needed).
#   - All services declared here directly.
# Apps connect via OTLP to https://${DOMAIN}/v1/* with HTTP Basic auth.

networks:
  obs-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  prometheus_data:
  victorialogs_data:
  tempo_data:
  pyroscope_data:
  grafana_data:

services:
  caddy:
    image: caddy:2-alpine
    container_name: otel-jps-caddy
    restart: unless-stopped
    networks: [obs-net]
    ports:
      - "80:80"
      - "443:443"
      - "4317:4317"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-ingest}
      BASIC_AUTH_HASH: ${BASIC_AUTH_HASH}
    depends_on:
      grafana:
        condition: service_started
      otel-collector:
        condition: service_started
    deploy:
      resources:
        limits: { memory: 128M }
        reservations: { memory: 32M }

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: otel-jps-otelcol
    restart: unless-stopped
    networks: [obs-net]
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    expose: ["4317", "4318", "8888", "13133"]
    depends_on:
      prometheus:
        condition: service_started
      victorialogs:
        condition: service_started
      tempo:
        condition: service_started
      pyroscope:
        condition: service_started
    deploy:
      resources:
        limits: { memory: 256M }
        reservations: { memory: 96M }

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: otel-jps-prometheus
    restart: unless-stopped
    networks: [obs-net]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-7d}
      - --web.enable-remote-write-receiver
      - --web.listen-address=0.0.0.0:9090
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    expose: ["9090"]
    deploy:
      resources:
        limits: { memory: 384M }
        reservations: { memory: 128M }

  victorialogs:
    image: victoriametrics/victoria-logs:v1.1.0-victorialogs
    container_name: otel-jps-victorialogs
    restart: unless-stopped
    networks: [obs-net]
    command:
      - --storageDataPath=/vlogs
      - --retentionPeriod=${VICTORIALOGS_RETENTION:-7d}
      - --httpListenAddr=0.0.0.0:9428
    volumes:
      - victorialogs_data:/vlogs
    expose: ["9428"]
    deploy:
      resources:
        limits: { memory: 256M }
        reservations: { memory: 64M }

  tempo:
    image: grafana/tempo:2.6.1
    container_name: otel-jps-tempo
    restart: unless-stopped
    networks: [obs-net]
    command:
      - -config.file=/etc/tempo/tempo.yaml
      - -config.expand-env=true
    volumes:
      - ./tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    expose: ["3200", "4317", "4318", "9095"]
    environment:
      TEMPO_RETENTION_HOURS: ${TEMPO_RETENTION_HOURS:-72}
    deploy:
      resources:
        limits: { memory: 512M }
        reservations: { memory: 192M }

  pyroscope:
    image: grafana/pyroscope:1.10.0
    container_name: otel-jps-pyroscope
    restart: unless-stopped
    networks: [obs-net]
    command: ["-config.file=/etc/pyroscope/pyroscope.yaml"]
    volumes:
      - ./pyroscope.yaml:/etc/pyroscope/pyroscope.yaml:ro
      - pyroscope_data:/data
    expose: ["4040"]
    environment:
      PYROSCOPE_RETENTION_HOURS: ${PYROSCOPE_RETENTION_HOURS:-336}
    deploy:
      resources:
        limits: { memory: 384M }
        reservations: { memory: 128M }

  grafana:
    image: grafana/grafana:11.3.0
    container_name: otel-jps-grafana
    restart: unless-stopped
    networks: [obs-net]
    volumes:
      - ./grafana-provisioning:/etc/grafana/provisioning:ro
      - ./grafana-dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: victoriametrics-logs-datasource
      GF_FEATURE_TOGGLES_ENABLE: traceToProfiles tracesEmbeddedFlameGraph
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-https://${DOMAIN:-localhost}/}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-https://example.invalid/alert}
    expose: ["3000"]
    depends_on:
      prometheus:
        condition: service_started
      victorialogs:
        condition: service_started
      tempo:
        condition: service_started
      pyroscope:
        condition: service_started
    deploy:
      resources:
        limits: { memory: 256M }
        reservations: { memory: 96M }

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: otel-jps-cadvisor
    restart: unless-stopped
    networks: [obs-net]
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    expose: ["8080"]
    command:
      - --housekeeping_interval=30s
      - --docker_only=true
      - --store_container_labels=false
      - --whitelisted_container_labels=com.docker.compose.service,com.docker.compose.project
    deploy:
      resources:
        limits: { memory: 128M }
        reservations: { memory: 32M }
