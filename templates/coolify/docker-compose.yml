# obstack Coolify-tuned compose.
# Differences from the base docker-compose.yml + compose/simple.yml:
#   - Uses ${SERVICE_FQDN_GRAFANA} so Coolify auto-issues a domain + Let's Encrypt cert.
#   - No `expose` for Caddy ports 80/443 — Coolify's own proxy handles that for the
#     Grafana service. OTLP gRPC port 4317 is published explicitly.
#   - Resource limits inlined (no overlay file).

services:
  caddy:
    image: caddy:2-alpine
    container_name: obstack-caddy
    restart: unless-stopped
    ports:
      - "${PORT_OTLP_GRPC:-4317}:4317"
    volumes:
      - type: bind
        source: ./Caddyfile
        target: /etc/caddy/Caddyfile
        read_only: true
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - SERVICE_FQDN_GRAFANA=${SERVICE_FQDN_GRAFANA}
      - BASIC_AUTH_USER=${BASIC_AUTH_USER:-ingest}
      - BASIC_AUTH_HASH=${BASIC_AUTH_HASH}
    depends_on:
      - grafana
      - otel-collector
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: obstack-otelcol
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - type: bind
        source: ./otel-collector-config.yaml
        target: /etc/otelcol-contrib/config.yaml
        read_only: true
    expose:
      - "4317"
      - "4318"
      - "8888"
      - "13133"
    depends_on:
      - prometheus
      - victorialogs
      - tempo
      - pyroscope
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 96M

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: obstack-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-7d}
      - --web.enable-remote-write-receiver
      - --web.listen-address=0.0.0.0:9090
    volumes:
      - type: bind
        source: ./prometheus.yml
        target: /etc/prometheus/prometheus.yml
        read_only: true
      - prometheus_data:/prometheus
    expose:
      - "9090"
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M

  victorialogs:
    image: victoriametrics/victoria-logs:v1.1.0-victorialogs
    container_name: obstack-victorialogs
    restart: unless-stopped
    command:
      - --storageDataPath=/vlogs
      - --retentionPeriod=${VICTORIALOGS_RETENTION:-7d}
      - --httpListenAddr=0.0.0.0:9428
    volumes:
      - victorialogs_data:/vlogs
    expose:
      - "9428"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  tempo:
    image: grafana/tempo:2.6.1
    container_name: obstack-tempo
    restart: unless-stopped
    command:
      - -config.file=/etc/tempo/tempo.yaml
      - -config.expand-env=true
    volumes:
      - type: bind
        source: ./tempo.yaml
        target: /etc/tempo/tempo.yaml
        read_only: true
      - tempo_data:/var/tempo
    expose:
      - "3200"
      - "4317"
      - "4318"
      - "9095"
    environment:
      - TEMPO_RETENTION_HOURS=${TEMPO_RETENTION_HOURS:-72}
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 192M

  pyroscope:
    image: grafana/pyroscope:1.10.0
    container_name: obstack-pyroscope
    restart: unless-stopped
    command: ["-config.file=/etc/pyroscope/pyroscope.yaml"]
    volumes:
      - type: bind
        source: ./pyroscope.yaml
        target: /etc/pyroscope/pyroscope.yaml
        read_only: true
      - pyroscope_data:/data
    expose:
      - "4040"
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M

  grafana:
    image: grafana/grafana:11.3.0
    container_name: obstack-grafana
    restart: unless-stopped
    volumes:
      - type: bind
        source: ./grafana-provisioning
        target: /etc/grafana/provisioning
        read_only: true
      - type: bind
        source: ./grafana-dashboards
        target: /etc/grafana/dashboards
        read_only: true
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_INSTALL_PLUGINS=victoriametrics-logs-datasource
      - GF_FEATURE_TOGGLES_ENABLE=traceToProfiles tracesEmbeddedFlameGraph
      - GF_SERVER_ROOT_URL=https://${SERVICE_FQDN_GRAFANA}
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-https://example.invalid/alert}
    expose:
      - "3000"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 96M

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: obstack-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    expose:
      - "8080"
    command:
      - --housekeeping_interval=30s
      - --docker_only=true
      - --store_container_labels=false
      - --whitelisted_container_labels=com.docker.compose.service,com.docker.compose.project
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

volumes:
  caddy_data:
  caddy_config:
  prometheus_data:
  victorialogs_data:
  tempo_data:
  pyroscope_data:
  grafana_data:
