# obstack OTel demo — STANDALONE compose project.
#
# This is NOT a profile overlay. It is its own compose project, with its own
# bridge network. Demo services emit OTLP to obstack's public endpoint
# (DEMO_OBSTACK_ENDPOINT) over HTTPS with HTTP Basic auth — exactly the path
# a real customer's apps would use.
#
# Run with: cd examples/otel-demo && docker compose up -d
# Or via:   make demo-up (from repo root)

x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: ${DEMO_OBSTACK_ENDPOINT}
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_EXPORTER_OTLP_HEADERS: ${DEMO_OBSTACK_AUTH_HEADER}
  OTEL_EXPORTER_OTLP_INSECURE: ${DEMO_OBSTACK_INSECURE:-false}
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=demo

services:
  demo-frontend:
    image: ghcr.io/open-telemetry/demo:1.12.0-frontend
    container_name: obstack-demo-frontend
    restart: unless-stopped
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: demo.frontend
      FRONTEND_PORT: "8080"
      AD_SERVICE_ADDR: demo-recommendation:9001
      CART_SERVICE_ADDR: demo-cart:7070
      CHECKOUT_SERVICE_ADDR: demo-checkout:5050
      PAYMENT_SERVICE_ADDR: demo-payment:50051
    ports:
      - "${DEMO_FRONTEND_PORT:-8082}:8080"

  demo-cart:
    image: ghcr.io/open-telemetry/demo:1.12.0-cart
    container_name: obstack-demo-cart
    restart: unless-stopped
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: demo.cart
      CART_SERVICE_PORT: "7070"
      VALKEY_ADDR: demo-valkey:6379
    depends_on: [demo-valkey]

  demo-valkey:
    image: valkey/valkey:7.2-alpine
    container_name: obstack-demo-valkey
    restart: unless-stopped

  demo-checkout:
    image: ghcr.io/open-telemetry/demo:1.12.0-checkout
    container_name: obstack-demo-checkout
    restart: unless-stopped
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: demo.checkout
      CHECKOUT_SERVICE_PORT: "5050"
      CART_SERVICE_ADDR: demo-cart:7070
      PAYMENT_SERVICE_ADDR: demo-payment:50051

  demo-payment:
    image: ghcr.io/open-telemetry/demo:1.12.0-payment
    container_name: obstack-demo-payment
    restart: unless-stopped
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: demo.payment
      PAYMENT_SERVICE_PORT: "50051"

  demo-recommendation:
    image: ghcr.io/open-telemetry/demo:1.12.0-recommendation
    container_name: obstack-demo-recommendation
    restart: unless-stopped
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: demo.recommendation
      RECOMMENDATION_SERVICE_PORT: "9001"

  demo-load-generator:
    image: ghcr.io/open-telemetry/demo:1.12.0-loadgenerator
    container_name: obstack-demo-loadgen
    restart: unless-stopped
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: demo.loadgen
      LOCUST_HOST: http://demo-frontend:8080
      LOCUST_USERS: "5"
      LOCUST_SPAWN_RATE: "1"
    depends_on: [demo-frontend]
