# Simple profile overlay.
# Targets: solo dev / indie SaaS, single VPS with 4 GB RAM.
# Apply with: docker compose -f docker-compose.yml -f compose/simple.yml up -d

services:
  caddy:
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

  otel-collector:
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 96M

  prometheus:
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M

  victorialogs:
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  tempo:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 192M
